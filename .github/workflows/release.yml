name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r envlogger/requirements.txt

      - name: Build wheel
        run: |
          bazel build -c opt --@rules_python//python/config_settings:python_version=${{ matrix.python-version }} envlogger:envlogger_wheel

      - name: Copy wheel to dist
        run: |
          mkdir -p dist
          cp bazel-bin/envlogger/*.whl dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.python-version }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Download artifacts (3.11)
        uses: actions/download-artifact@v4
        with:
          name: releases-3.11
          path: dist

      - name: Download artifacts (3.12)
        uses: actions/download-artifact@v4
        with:
          name: releases-3.12
          path: dist

      - name: Download artifacts (3.13)
        uses: actions/download-artifact@v4
        with:
          name: releases-3.13
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
